---
# ClusterRole grants the operator the minimum permissions it needs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: autoscaler-operator
rules:
  # Watch & list Deployments; patch replicas.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Read pod specs (to calculate resource requests).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Read PodMetrics from the Metrics Server.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

  # Emit Kubernetes Events for observability.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Leader election (only needed when --leader-elect=true).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autoscaler-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: autoscaler-operator
subjects:
  - kind: ServiceAccount
    name: autoscaler-operator
    namespace: autoscaler-system
