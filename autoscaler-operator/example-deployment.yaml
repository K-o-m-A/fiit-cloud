---
# Example: a web API deployment that the autoscaler will manage.
# Apply this file and the operator will immediately start watching it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-api
  namespace: default
  labels:
    # ── Required opt-in label ──────────────────────────────────────────────
    autoscaler.yourorg.io/enabled: "true"

  annotations:
    # ── Replica bounds (required: max-replicas) ───────────────────────────
    autoscaler.yourorg.io/min-replicas: "2"
    autoscaler.yourorg.io/max-replicas: "20"

    # ── Step sizes ────────────────────────────────────────────────────────
    autoscaler.yourorg.io/scale-up-step: "2"     # add 2 pods per scale-up event
    autoscaler.yourorg.io/scale-down-step: "1"   # remove 1 pod per scale-down event

    # ── Cooldown windows ──────────────────────────────────────────────────
    autoscaler.yourorg.io/scale-up-cooldown: "60"    # seconds between scale-ups
    autoscaler.yourorg.io/scale-down-cooldown: "300" # seconds between scale-downs

    # ── CPU thresholds (% of requests) ───────────────────────────────────
    autoscaler.yourorg.io/cpu-enabled: "true"
    autoscaler.yourorg.io/cpu-scale-up-threshold: "75"   # scale up  when avg CPU > 75%
    autoscaler.yourorg.io/cpu-scale-down-threshold: "25" # scale down when avg CPU < 25%

    # ── Memory thresholds (% of requests) ────────────────────────────────
    autoscaler.yourorg.io/mem-enabled: "true"
    autoscaler.yourorg.io/mem-scale-up-threshold: "80"
    autoscaler.yourorg.io/mem-scale-down-threshold: "30"

spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-web-api
  template:
    metadata:
      labels:
        app: my-web-api
    spec:
      containers:
        - name: api
          image: yourorg/my-web-api:latest
          ports:
            - containerPort: 8080
          # Resource requests are REQUIRED for CPU/Memory utilisation % to work.
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
