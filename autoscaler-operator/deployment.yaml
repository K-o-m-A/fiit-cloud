---
apiVersion: v1
kind: Namespace
metadata:
  name: autoscaler-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoscaler-operator
  namespace: autoscaler-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaler-operator
  namespace: autoscaler-system
  labels:
    app.kubernetes.io/name: autoscaler-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: autoscaler-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: autoscaler-operator
    spec:
      serviceAccountName: autoscaler-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: yourorg/autoscaler-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --watch-namespace=          # empty = watch all namespaces
            - --sync-period=30s
            - --metrics-bind-address=:8080
            - --leader-elect=true
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: autoscaler-operator-metrics
  namespace: autoscaler-system
  labels:
    app.kubernetes.io/name: autoscaler-operator
spec:
  selector:
    app.kubernetes.io/name: autoscaler-operator
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
