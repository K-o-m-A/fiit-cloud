apiVersion: v1
kind: Service
metadata:
  name: {{ include "autoscaler-operator.serviceName" . }}
  labels:
    {{- include "autoscaler-operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "autoscaler-operator.selectorLabels" . | nindent 4 }}
