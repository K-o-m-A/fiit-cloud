replicaCount: 1

image:
  repository: xfarkasp/autoscaler-operator
  pullPolicy: Always
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# livenessProbe:
#   httpGet:
#     path: /healthz
#     port: 8081
#   initialDelaySeconds: 15
#   periodSeconds: 20
# readinessProbe:
#   httpGet:
#     path: /readyz
#     port: 8081
#   initialDelaySeconds: 5
#   periodSeconds: 10

rbac:
  create: true

controller:
  watchNamespace: ""
  syncPeriod: 30s
  metricsBindAddress: ":8080"
  leaderElect: true

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: null
  targetMemoryUtilizationPercentage: null

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
